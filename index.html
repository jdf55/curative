<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دوائي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0D0D0D;
      --paper: #F5F0E8;
      --card-dark-bg: #0D0D0D;
      --card-light-bg: #EDE8DF;
      --accent: #C8FF00;
      --accent2: #FF6B35;
      --muted: rgba(13,13,13,0.4);
      --radius: 22px;
      --icon-btn-bg: #EDE8DF;
      --icon-btn-hover: #ddd8cf;
      --add-btn-border: rgba(13,13,13,0.2);
      --add-btn-hover-border: rgba(13,13,13,0.4);
      --add-btn-color: rgba(13,13,13,0.4);
      --add-btn-hover-color: #0D0D0D;
      --streak-bg: rgba(255,255,255,0.5);
      --streak-border: rgba(13,13,13,0.08);
    }

    html.dark {
      --ink: #F0EBE1;
      --paper: #131210;
      --card-dark-bg: #1E1C18;
      --card-light-bg: #252320;
      --accent: #C8FF00;
      --accent2: #FF6B35;
      --muted: rgba(240,235,225,0.38);
      --icon-btn-bg: #252320;
      --icon-btn-hover: #2f2d29;
      --add-btn-border: rgba(240,235,225,0.18);
      --add-btn-hover-border: rgba(240,235,225,0.38);
      --add-btn-color: rgba(240,235,225,0.35);
      --add-btn-hover-color: #F0EBE1;
      --streak-bg: rgba(255,255,255,0.04);
      --streak-border: rgba(255,255,255,0.07);
    }

    html, body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .screen { display: none; position: relative; z-index: 1; max-width: 440px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; min-height: 100vh; }
    .screen.active { display: block; }

    /* ════ SETUP ════ */
    .setup-eyebrow { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
    .setup-heading { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; line-height: 0.95; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; line-height: 1.5; }

    .med-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

    .med-row {
      background: var(--card-dark-bg);
      border-radius: 18px;
      padding: 1.25rem;
      position: relative;
      color: #fff;
      transition: background 0.3s;
    }
    html.dark .med-row { color: var(--ink); }

    .med-row:nth-child(even) {
      background: var(--card-light-bg);
      color: var(--ink);
      border: 1.5px solid rgba(13,13,13,0.08);
    }
    html.dark .med-row:nth-child(even) {
      border-color: rgba(255,255,255,0.06);
    }
    html.dark .med-row:nth-child(odd) {
      color: var(--ink);
    }

    .med-row-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      opacity: 0.4; margin-bottom: 0.9rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .remove-btn {
      background: none; border: none; cursor: pointer;
      font-size: 15px; opacity: 0.35; line-height: 1; padding: 0;
      color: inherit; transition: opacity 0.15s;
    }
    .remove-btn:hover { opacity: 0.8; }

    .med-row-fields { display: grid; grid-template-columns: 1fr 100px; gap: 8px; }

    .field label { display: block; font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 4px; color: var(--muted); }

    .field input {
      width: 100%; border-radius: 10px; border: none;
      padding: 0.55rem 0.75rem;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      outline: none; transition: box-shadow 0.15s; -webkit-appearance: none;
      background: rgba(255,255,255,0.09); color: #fff;
    }
    html.dark .field input { background: rgba(255,255,255,0.07); color: var(--ink); }
    .field input::placeholder { color: rgba(255,255,255,0.2); }
    html.dark .field input::placeholder { color: rgba(240,235,225,0.25); }
    .field input:focus { box-shadow: 0 0 0 2px var(--accent); }

    .med-row:nth-child(even) .field input {
      background: rgba(255,255,255,0.65);
      color: var(--ink);
    }
    .med-row:nth-child(even) .field input::placeholder { color: rgba(13,13,13,0.22); }
    html.dark .med-row:nth-child(even) .field input {
      background: rgba(255,255,255,0.08);
      color: var(--ink);
    }

    .add-med-btn {
      width: 100%; padding: 0.9rem;
      background: none;
      border: 1.5px dashed var(--add-btn-border);
      border-radius: 18px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--add-btn-color); cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.05em;
    }
    .add-med-btn:hover { border-color: var(--add-btn-hover-border); color: var(--add-btn-hover-color); }

    .start-btn {
      width: 100%; margin-top: 1.25rem; padding: 1.1rem;
      border: none; border-radius: var(--radius);
      background: var(--ink); color: var(--accent);
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: transform 0.12s, opacity 0.12s;
    }
    .start-btn:hover  { opacity: 0.85; }
    .start-btn:active { transform: scale(0.98); }

    .err-msg { text-align: center; font-size: 12px; color: var(--accent2); margin-top: 0.6rem; min-height: 18px; }

    /* ════ HOME ════ */
    .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; }
    .header-title { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; line-height: 0.95; letter-spacing: -0.02em; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .header-date  { font-size: 12px; color: var(--muted); text-align: left; line-height: 1.5; }
    .header-date strong { display: block; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); }

    .header-btns { display: flex; gap: 6px; }
    .icon-btn {
      background: var(--icon-btn-bg); border: none; border-radius: 50%;
      width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--icon-btn-hover); }
    .icon-btn svg { width: 16px; height: 16px; }

    .cards-list { display: flex; flex-direction: column; gap: 10px; }

    .card {
      border-radius: var(--radius); padding: 1.75rem;
      position: relative; overflow: hidden;
      transition: transform 0.12s, background 0.3s;
    }
    .card:active { transform: scale(0.985); }
    .card.dark  { background: var(--card-dark-bg); color: var(--ink); }
    .card.light { background: var(--card-light-bg); color: var(--ink); border: 1.5px solid rgba(13,13,13,0.08); }
    html.dark .card.light { border-color: rgba(255,255,255,0.06); }

    /* force white text only in light mode dark cards */
    html:not(.dark) .card.dark { color: #fff; }
    html:not(.dark) .card.dark .card-name { color: #fff; }
    html:not(.dark) .card.dark .days-num  { color: var(--accent); }

    html.dark .card.dark .card-name { color: var(--ink); }
    html.dark .card.dark .days-num  { color: var(--accent); }

    .card-bg-num { position: absolute; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 150px; line-height: 1; opacity: 0.05; left: -8px; bottom: -18px; pointer-events: none; user-select: none; color: var(--ink); }

    .card-tag  { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.4; margin-bottom: 0.3rem; }
    .card-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; line-height: 1.1; margin-bottom: 1.1rem; color: var(--ink); }

    .dot-track { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 0.9rem; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }

    html:not(.dark) .card.dark .dot.done       { background: var(--accent); }
    html:not(.dark) .card.dark .dot.empty      { background: rgba(255,255,255,0.15); }
    html:not(.dark) .card.dark .dot.today-dot  { background: rgba(255,255,255,0.3); box-shadow: 0 0 0 2px var(--accent); }
    html:not(.dark) .card.light .dot.done      { background: var(--ink); }
    html:not(.dark) .card.light .dot.empty     { background: rgba(13,13,13,0.1); }
    html:not(.dark) .card.light .dot.today-dot { background: rgba(13,13,13,0.18); box-shadow: 0 0 0 2px var(--ink); }

    html.dark .card .dot.done      { background: var(--accent); }
    html.dark .card .dot.empty     { background: rgba(240,235,225,0.12); }
    html.dark .card .dot.today-dot { background: rgba(240,235,225,0.25); box-shadow: 0 0 0 2px var(--accent); }

    .prog-wrap { height: 3px; border-radius: 2px; margin-bottom: 1.1rem; background: rgba(13,13,13,0.1); }
    html:not(.dark) .card.dark .prog-wrap { background: rgba(255,255,255,0.12); }
    html.dark .prog-wrap { background: rgba(240,235,225,0.1); }

    .prog-fill { height: 3px; border-radius: 2px; transition: width 0.6s cubic-bezier(.4,0,.2,1); background: var(--ink); }
    html:not(.dark) .card.dark .prog-fill { background: var(--accent); }
    html.dark .prog-fill { background: var(--accent); }

    .card-bottom { display: flex; align-items: flex-end; justify-content: space-between; }
    .days-num { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; line-height: 1; color: var(--ink); }
    html:not(.dark) .card.dark .days-num { color: var(--accent); }
    html.dark .days-num { color: var(--accent); }

    .days-label { font-size: 11px; opacity: 0.4; margin-top: 3px; }

    .take-btn {
      border: none; border-radius: 50px; padding: 0.55rem 1.2rem;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .take-btn:active { transform: scale(0.95); }

    html:not(.dark) .card.dark .take-btn        { background: var(--accent); color: #000; }
    html:not(.dark) .card.dark .take-btn.taken  { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.35); cursor: default; }
    html:not(.dark) .card.light .take-btn       { background: var(--ink); color: #fff; }
    html:not(.dark) .card.light .take-btn.taken { background: rgba(13,13,13,0.1); color: rgba(13,13,13,0.3); cursor: default; }

    html.dark .take-btn        { background: var(--accent); color: #000; }
    html.dark .take-btn.taken  { background: rgba(240,235,225,0.1); color: rgba(240,235,225,0.3); cursor: default; }

    .streak-box {
      margin-top: 1rem; border-radius: var(--radius);
      border: 1.5px solid var(--streak-border); padding: 1.5rem;
      display: flex; align-items: center; gap: 1.25rem;
      background: var(--streak-bg);
      transition: background 0.3s, border-color 0.3s;
    }
    .streak-circle { width: 60px; height: 60px; border-radius: 50%; background: var(--ink); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.3s; }
    .streak-num   { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); }
    .streak-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 3px; }
    .streak-sub   { font-size: 12px; color: var(--muted); line-height: 1.4; }

    .reset-link {
      display: block; text-align: center; margin-top: 2rem;
      font-size: 11px; color: var(--muted); cursor: pointer;
      letter-spacing: 0.05em; text-decoration: none; transition: color 0.15s;
    }
    .reset-link:hover { color: var(--accent2); }

    @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.06)} 100%{transform:scale(1)} }
    .pop { animation: pop 0.25s ease; }
  </style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div class="screen active" id="screenSetup">
  <div class="setup-eyebrow">خطوة واحدة</div>
  <div class="setup-heading">أضف<br/>أدويتك</div>
  <p class="setup-sub">سجّل كل دواء مرة واحدة،<br/>وبعدها كل يوم بضغطة.</p>

  <div class="med-rows" id="medRows"></div>
  <button class="add-med-btn" onclick="addMedRow()">+ أضف دواء</button>
  <button class="start-btn" onclick="startApp()">ابدأ التتبع ←</button>
  <div class="err-msg" id="errMsg"></div>
</div>


<!-- ══ HOME ══ -->
<div class="screen" id="screenHome">
  <div class="header">
    <div class="header-title">دوائي<br/>اليوم</div>
    <div class="header-right">
      <div class="header-btns">

        <!-- dark mode toggle -->
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="تغيير المظهر">
          <!-- sun icon -->
          <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- moon icon -->
          <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <!-- settings -->
        <button class="icon-btn" onclick="goSetup()" title="الإعدادات">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>

      </div>
      <div class="header-date" id="dateDisplay"></div>
    </div>
  </div>

  <div class="cards-list" id="cardsList"></div>

  <div class="streak-box">
    <div class="streak-circle"><span class="streak-num" id="streakNum">0</span></div>
    <div>
      <div class="streak-title">أيام متواصلة</div>
      <div class="streak-sub">كل ما زادت الأيام،<br/>كلما تحسّن التزامك</div>
    </div>
  </div>

  <a class="reset-link" onclick="resetAll()">↺ إعادة البداية من الصفر</a>
</div>


<script>
  const KEY       = 'dawai_v5';
  const THEME_KEY = 'dawai_theme';

  /* ── theme ── */
  function applyTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    document.getElementById('iconSun').style.display  = dark  ? 'block' : 'none';
    document.getElementById('iconMoon').style.display = dark  ? 'none'  : 'block';
  }
  function toggleTheme() {
    const isDark = !document.documentElement.classList.contains('dark');
    localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
    applyTheme(isDark);
  }
  function initTheme() {
    const saved  = localStorage.getItem(THEME_KEY);
    const prefer = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved ? saved === 'dark' : prefer);
  }

  /* ── data ── */
  function load() { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch(e) { return null; } }
  function save(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e){} }
  function todayKey() { return new Date().toISOString().slice(0,10); }

  /* ── init ── */
  function init() {
    initTheme();
    const data = load();
    if (data && data.meds && data.meds.length > 0) showHome();
    else showSetup();
  }

  /* ── screens ── */
  function showSetup() {
    document.getElementById('screenHome').classList.remove('active');
    document.getElementById('screenSetup').classList.add('active');
    window.scrollTo(0,0);
  }
  function showHome() {
    document.getElementById('screenSetup').classList.remove('active');
    document.getElementById('screenHome').classList.add('active');
    setDate(); render();
    window.scrollTo(0,0);
  }
  function goSetup() {
    const data = load();
    document.getElementById('medRows').innerHTML = '';
    rowCount = 0;
    if (data && data.meds) data.meds.forEach(m => addMedRow(m.name, m.total));
    if (rowCount === 0) addMedRow();
    showSetup();
  }

  /* ── setup rows ── */
  let rowCount = 0;

  function addMedRow(name, total) {
    rowCount++;
    const id  = 'row_' + rowCount;
    const div = document.createElement('div');
    div.className = 'med-row';
    div.id = id;
    div.innerHTML = `
      <div class="med-row-label">
        <span>دواء ${rowCount}</span>
        <button class="remove-btn" onclick="removeRow('${id}')">✕</button>
      </div>
      <div class="med-row-fields">
        <div class="field">
          <label>اسم الدواء</label>
          <input type="text" class="med-name" placeholder="مثال: أوميبرازول" maxlength="30" value="${name||''}" />
        </div>
        <div class="field">
          <label>الأيام</label>
          <input type="number" class="med-total" placeholder="30" min="1" max="999" value="${total||''}" />
        </div>
      </div>`;
    document.getElementById('medRows').appendChild(div);
  }

  function removeRow(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
    reNumberRows();
  }
  function reNumberRows() {
    document.querySelectorAll('.med-row').forEach((r, i) => {
      const label = r.querySelector('.med-row-label span');
      if (label) label.textContent = 'دواء ' + (i + 1);
    });
  }

  /* ── start ── */
  function startApp() {
    const rows = document.querySelectorAll('.med-row');
    const err  = document.getElementById('errMsg');
    if (rows.length === 0) { err.textContent = 'أضف دواءاً واحداً على الأقل'; return; }
    const existing = load() || {};
    const oldMeds  = existing.meds || [];
    const meds = [];
    for (let i = 0; i < rows.length; i++) {
      const name  = rows[i].querySelector('.med-name').value.trim();
      const total = parseInt(rows[i].querySelector('.med-total').value);
      if (!name)       { err.textContent = `أدخل اسم الدواء ${i+1}`; return; }
      if (!total || total < 1) { err.textContent = `أدخل عدد أيام الدواء ${i+1}`; return; }
      const prev = oldMeds.find(m => m.name === name);
      meds.push({ name, total, days: prev ? prev.days : {} });
    }
    err.textContent = '';
    save({ meds });
    showHome();
  }

  /* ── dots ── */
  function buildDots(container, days, total) {
    container.innerHTML = '';
    const show = Math.min(total, 42);
    const n = Object.keys(days).length;
    for (let i = 0; i < show; i++) {
      const d = document.createElement('div');
      d.className = 'dot ' + (i < n ? 'done' : i === n ? 'today-dot' : 'empty');
      container.appendChild(d);
    }
  }

  /* ── streak ── */
  function calcStreak(days) {
    const keys = Object.keys(days).filter(k => days[k]).sort().reverse();
    if (!keys.length) return 0;
    let s = 0; let exp = new Date(); exp.setHours(0,0,0,0);
    for (const k of keys) {
      const d = new Date(k); d.setHours(0,0,0,0);
      if (Math.round((exp - d) / 86400000) <= 1) { s++; exp = d; } else break;
    }
    return s;
  }

  /* ── render ── */
  function render() {
    const data = load(); if (!data || !data.meds) return;
    const today = todayKey();
    const list  = document.getElementById('cardsList');
    list.innerHTML = '';

    data.meds.forEach((med, idx) => {
      const isDark = idx % 2 === 0;
      const count  = Object.keys(med.days).length;
      const rem    = Math.max(0, med.total - count);
      const pct    = Math.min(100, Math.round(count / med.total * 100));
      const taken  = med.days[today] === true;

      const card = document.createElement('div');
      card.className = 'card ' + (isDark ? 'dark' : 'light');
      card.id = 'card_' + idx;
      card.innerHTML = `
        <div class="card-bg-num">${med.total}</div>
        <div class="card-tag">دواء ${idx + 1}</div>
        <div class="card-name">${med.name}</div>
        <div class="dot-track" id="dots_${idx}"></div>
        <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="card-bottom">
          <div><div class="days-num">${rem}</div><div class="days-label">يوم متبقي</div></div>
          <button class="take-btn ${taken?'taken':''}" onclick="take(${idx})">
            ${taken ? '✓ تم اليوم' : 'أخذته ✓'}
          </button>
        </div>`;
      list.appendChild(card);
      buildDots(card.querySelector('#dots_' + idx), med.days, med.total);
    });

    const streaks = data.meds.map(m => calcStreak(m.days));
    document.getElementById('streakNum').textContent = streaks.length ? Math.min(...streaks) : 0;
  }

  /* ── take ── */
  function take(idx) {
    const data = load(); if (!data) return;
    const today = todayKey();
    if (data.meds[idx].days[today]) return;
    data.meds[idx].days[today] = true;
    save(data); render();
    const card = document.getElementById('card_' + idx);
    if (card) { card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop'); }
  }

  /* ── reset ── */
  function resetAll() {
    if (!confirm('هل تريد مسح كل شيء والبدء من الصفر؟')) return;
    localStorage.removeItem(KEY);
    document.getElementById('medRows').innerHTML = '';
    rowCount = 0;
    addMedRow();
    showSetup();
  }

  /* ── date ── */
  function setDate() {
    const now    = new Date();
    const days   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    document.getElementById('dateDisplay').innerHTML =
      `<strong>${days[now.getDay()]}</strong>${now.getDate()} ${months[now.getMonth()]}`;
  }

  addMedRow();
  init();
</script>
</body>
</html>
